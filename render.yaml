services:
  - type: web
    name: attendtrack-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # you'll set this in the Render dashboard
    disk:
      name: attendtrack-db
      mountPath: /data
      sizeGB: 1
